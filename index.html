<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在场悬置</title>
  <link rel="stylesheet" href="style.css">
  <!-- 引入 p5.js 和 p5.sound 库 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>

<body>
  <div id="container">
    <h1>《在场悬置》——悬置你的照片</h1>
    <div id="controls">
      <input type="file" id="fileInput" accept="image/*">
      <button id="startBtn" disabled>开始扫描</button>
      <button id="downloadBtn" style="display:none;">下载你的悬置图</button>
    </div>
    <div id="canvasContainer"></div>
    <p id="status">请先选择一张图片</p>
  </div>
  <script src="sketch.js"></script>
    <!-- 底部信息区，直接放在深灰背景上 -->
  <div id="footer">
    <p id="author-line">
      作者：任宇坤 &nbsp; 公众号&amp;小红书：呼呼hu
      <a href="https://mp.weixin.qq.com/mp/appmsgalbum?__biz=Mzg5MTc3NjcxMg==&action=getalbum&album_id=4030609494685138948#wechat_redirect"
         target="_blank" id="album-link">点击查看《在场悬置》原作品</a>
    </p>
    <div id="qrcodes">
      <img src="qrcode_wechat.png" alt="微信公众号二维码" class="qrcode">
      <img src="qrcode_xiaohongshu.png" alt="小红书二维码" class="qrcode">
    </div>
  </div>
</body>
</html>
